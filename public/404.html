<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA deep-link fallback.
      // Unknown paths (e.g. /sw) are served as /404.html; we persist the
      // intended URL and load /index.html once, then restore the URL.
      (function () {
        var redirect = window.location.pathname + window.location.search + window.location.hash;

        try {
          // Avoid poisoning the redirect key if someone visits /404.html directly.
          if (redirect && redirect !== "/404.html") {
            sessionStorage.setItem("spa-redirect", redirect);
          }
        } catch (e) {
          // ignore
        }

        window.location.replace("/index.html");
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=/index.html" />
    </noscript>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
